services:
  - type: web
    name: pharmacy-mvp-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run api:build
    preDeployCommand: npm run api:db:push
    initialDeployHook: npm run api:db:seed
    startCommand: npm --workspace @pharmacy/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-mvp-db
          property: connectionString

databases:
  - name: pharmacy-mvp-db
    plan: free
    databaseName: pharmacy_mvp
    user: pharmacy_mvp
